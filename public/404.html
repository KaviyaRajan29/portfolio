<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Kaviya Rajan — Full Stack Developer</title>
    <!--
      Single-Page Apps for GitHub Pages — https://github.com/rafgraph/spa-github-pages
      GitHub Pages serves this 404 for any unknown path; it re-encodes the path into a
      query string and redirects to the app, where index.html restores the real URL so
      BrowserRouter can match it. pathSegmentsToKeep = 1 keeps the "/portfolio" base.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
