<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 824" width="1440" height="824" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="leftBg" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#42424a"/>
      <stop offset="1" stop-color="#28282e"/>
    </linearGradient>
    <radialGradient id="glow" cx="42%" cy="13%" r="60%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rightBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dde0e0"/>
      <stop offset="1" stop-color="#d3d6d6"/>
    </linearGradient>
  </defs>

  <!-- panels -->
  <rect x="0" y="0" width="765" height="824" fill="url(#leftBg)"/>
  <rect x="0" y="0" width="765" height="824" fill="url(#glow)"/>
  <rect x="765" y="0" width="675" height="824" fill="url(#rightBg)"/>

  <!-- ===== LEFT PANEL ===== -->
  <!-- logo -->
  <rect x="24" y="35" width="29" height="29" rx="8" fill="#3a3a42"/>
  <svg x="27" y="38" width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8 2v4"/><path d="M16 2v4"/><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18"/>
  </svg>
  <text x="62" y="56" font-size="16" font-weight="700" fill="#ffffff">EventHub</text>

  <!-- heading -->
  <text x="24" y="308" font-size="31" font-weight="700" fill="#ffffff">Plan events your team will</text>
  <text x="24" y="346" font-size="31" font-weight="700" fill="#ffffff">actually love.</text>

  <!-- paragraph -->
  <text x="24" y="410" font-size="13" fill="#c6c9cd">Collaborate on tasks, chat in real-time, and keep</text>
  <text x="24" y="430" font-size="13" fill="#c6c9cd">everyone on the same page — from the first invite to the</text>
  <text x="24" y="450" font-size="13" fill="#c6c9cd">final wrap-up.</text>

  <!-- features -->
  <svg x="24" y="478" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9.94 15.5A2 2 0 0 0 8.5 14.06l-6.14-1.58a.5.5 0 0 1 0-.96L8.5 9.94A2 2 0 0 0 9.94 8.5l1.58-6.14a.5.5 0 0 1 .96 0L14.06 8.5A2 2 0 0 0 15.5 9.94l6.14 1.58a.5.5 0 0 1 0 .96L15.5 14.06a2 2 0 0 0-1.44 1.44l-1.58 6.14a.5.5 0 0 1-.96 0z"/>
    <path d="M20 3v4"/><path d="M22 5h-4"/>
  </svg>
  <text x="50" y="491" font-size="13" fill="#e7e9eb">Real-time chat + presence</text>

  <svg x="24" y="506" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>
  </svg>
  <text x="50" y="519" font-size="13" fill="#e7e9eb">Task boards that stay in sync</text>

  <svg x="24" y="534" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/>
  </svg>
  <text x="50" y="547" font-size="13" fill="#e7e9eb">Secure invites with email verify</text>

  <!-- footer -->
  <text x="24" y="765" font-size="11" fill="#8a8d92">© 2026 EventHub</text>

  <!-- ===== RIGHT PANEL ===== -->
  <text x="988" y="262" font-size="23" font-weight="700" fill="#1a1a1f">Welcome back</text>
  <text x="988" y="306" font-size="13" fill="#6f7277">Sign in to continue to EventHub.</text>

  <!-- email -->
  <text x="988" y="351" font-size="11" font-weight="600" fill="#2b2b31">Email</text>
  <rect x="988" y="362" width="327" height="31" rx="5" fill="#ffffff" stroke="#cfd2d2" stroke-width="1"/>
  <svg x="1000" y="370" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9b9ea3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
  </svg>
  <text x="1027" y="382" font-size="12" fill="#9b9ea3">you@example.com</text>

  <!-- password -->
  <text x="988" y="424" font-size="11" font-weight="600" fill="#2b2b31">Password</text>
  <rect x="988" y="435" width="327" height="31" rx="5" fill="#ffffff" stroke="#cfd2d2" stroke-width="1"/>
  <svg x="1000" y="443" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9b9ea3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
  </svg>
  <text x="1027" y="456" font-size="13" letter-spacing="1.5" fill="#3a3a40">••••••••</text>

  <!-- forgot -->
  <text x="1315" y="489" font-size="11" fill="#4d5055" text-anchor="end">Forgot password?</text>

  <!-- button -->
  <rect x="988" y="506" width="327" height="33" rx="5" fill="#2f2f36"/>
  <text x="1151.5" y="527" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Sign in</text>

  <!-- create account -->
  <text x="1151.5" y="577" font-size="12" text-anchor="middle"><tspan fill="#6f7277">Don't have an account? </tspan><tspan fill="#1a1a1f" font-weight="600">Create one</tspan></text>
</svg>
